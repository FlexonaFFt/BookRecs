services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    profiles:
      - local-s3
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    profiles:
      - local-s3
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${BOOKRECS_S3_BUCKET} || true
      "

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - .env
    command: ["python", "-m", "source.interfaces.pipeline_entrypoint"]
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      minio-init:
        condition: service_completed_successfully
        required: false
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts

  demo-seed:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - .env
    command: ["python", "-m", "source.interfaces.demo_seed_entrypoint"]
    depends_on:
      pipeline:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "source.interfaces.api_entrypoint"]
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      minio-init:
        condition: service_completed_successfully
        required: false
      demo-seed:
        condition: service_completed_successfully
        required: false
    ports:
      - "${BOOKRECS_API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pg_data:
  minio_data:

networks:
  default:
    name: ${BOOKRECS_DOCKER_NETWORK:-bookrecs_net}
