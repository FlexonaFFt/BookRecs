# Production docker-compose — использует внешние Postgres и S3 (рег.ру или другой провайдер).
# Локальные контейнеры postgres/minio здесь отсутствуют — всё через .env.
services:
  pipeline:
    image: ghcr.io/flexonafft/bookrecs:latest
    restart: "no"
    env_file:
      - .env
    command: ["python", "-m", "source.interfaces.pipeline_entrypoint"]
    volumes:
      - app_data:/app/data/raw_data
      - app_artifacts:/app/artifacts

  api:
    image: ghcr.io/flexonafft/bookrecs:latest
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "source.interfaces.api_entrypoint"]
    ports:
      - "${BOOKRECS_API_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data/raw_data
      - app_artifacts:/app/artifacts

  frontend:
    image: ghcr.io/flexonafft/bookrecs-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  app_data:
  app_artifacts:

networks:
  default:
    name: ${BOOKRECS_DOCKER_NETWORK:-bookrecs_net}
