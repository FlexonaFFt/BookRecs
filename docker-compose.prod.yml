services:
  postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 1; done &&
      mc mb -p local/${BOOKRECS_S3_BUCKET} || true
      "

  pipeline:
    image: ghcr.io/flexonafft/bookrecs:latest
    restart: "no"
    env_file:
      - .env
    command: ["python", "-m", "source.interfaces.pipeline_entrypoint"]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - app_data:/app/data/raw_data
      - app_artifacts:/app/artifacts

  api:
    image: ghcr.io/flexonafft/bookrecs:latest
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "source.interfaces.api_entrypoint"]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${BOOKRECS_API_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data/raw_data
      - app_artifacts:/app/artifacts

  frontend:
    image: ghcr.io/flexonafft/bookrecs-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  pg_data:
  minio_data:
  app_data:
  app_artifacts:

networks:
  default:
    name: ${BOOKRECS_DOCKER_NETWORK:-bookrecs_net}
